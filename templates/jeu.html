<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Undercover тАУ {{ code }}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="page-center" id="app">

  <!-- ├ЙCRAN : INDICE -->
  <div id="ecran-indice" class="ecran">
    <div id="zone-video" class="hidden">
      <video id="ma-video" controls autoplay muted playsinline
             style="width:100%;max-width:500px;border-radius:12px;margin:16px 0">
        <source id="src-video" src="" type="video/mp4">
      </video>
    </div>
    <div id="zone-image" class="hidden">
      <img id="mon-image" src="" style="width:100%;max-width:500px;border-radius:12px;margin:16px 0">
    </div>
    <div id="zone-mrwhite" class="hidden">
      <p class="hint">Tu n'as pas d'indice.<br>Fais semblant de regarder quelque chose... ЁЯОн</p>
      <div id="compteur" class="compteur-mr">--</div>
    </div>
    <button id="btn-pret" class="btn btn-primary" onclick="declarer_pret()" disabled>
      тП│ Regarde d'abord...
    </button>
    <p id="txt-attente-pret" class="hint" style="display:none"></p>
  </div>

  <!-- ├ЙCRAN : VOTE -->
  <div id="ecran-vote" class="ecran hidden">
    <div class="logo">ЁЯЧ│</div>
    <h2 class="titre-secondaire">Qui est l'imposteur ?</h2>
    <p class="hint">Discutez, puis votez !</p>
    <div id="liste-votes" class="liste-votes"></div>
    <button id="btn-voter" class="btn btn-primary" onclick="validerVote()" disabled>
      S├йlectionne un joueur
    </button>
  </div>

  <!-- ├ЙCRAN : R├ЙSULTAT MANCHE -->
  <div id="ecran-resultat" class="ecran hidden">
    <div id="resultat-icone" class="logo"></div>
    <h2 id="resultat-titre" class="titre-secondaire"></h2>
    <div class="card resultat-card">
      <p id="resultat-elu"></p>
      <p id="resultat-imposteur"></p>
      <p id="resultat-theme"></p>
    </div>
    <div id="resultat-scores-manche" class="votes-detail"></div>
    <div id="resultat-scores-total" class="votes-detail"></div>
    <div id="resultat-votes" class="votes-detail"></div>
    <div id="btn-manche-zone"></div>
  </div>

  <!-- ├ЙCRAN : FIN DE PARTIE -->
  <div id="ecran-fin" class="ecran hidden">
    <div class="logo">ЁЯПЖ</div>
    <h2 class="titre-secondaire">Partie termin├йe !</h2>
    <div id="podium" class="card resultat-card" style="margin:16px 0"></div>
    <a href="/" class="btn btn-primary" style="margin-top:16px">ЁЯПа Retour ├а l'accueil</a>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<script>
  const CODE     = "{{ code }}";
  const PSEUDO   = "{{ pseudo }}";
  const EST_HOTE = {{ 'true' if est_hote else 'false' }};

  let monRole       = null;
  let maVideoUrl    = null;
  let voteChoisi    = null;
  let contenuAffiche = false;

  const socket = io(window.location.origin, {transports: ['polling']});

  socket.on('connect', () => {
    console.log("Connect├й ! sid=", socket.id);
    socket.emit('rejoindre_jeu', { code: CODE, pseudo: PSEUDO });
  });

  socket.on('ton_role', (data) => {
    console.log("ton_role re├зu !", data);
    monRole    = data.role;
    maVideoUrl = data.video_url;
    contenuAffiche = false;
    afficherContenu();
  });

  socket.on('tout_le_monde_pret', () => {
    console.log("tout_le_monde_pret re├зu !");
    afficherEcranVote();
  });

  socket.on('resultat', (data) => {
    afficherEcran('ecran-resultat');

    const victoire = data.victoire_civils;
    document.getElementById('resultat-icone').textContent = victoire ? 'тЬЕ' : 'тЭМ';
    document.getElementById('resultat-titre').textContent = victoire ? 'Les civils ont gagn├й !' : "L'imposteur a gagn├й !";
    document.getElementById('resultat-elu').textContent       = `ЁЯЧ│ ├Йlu : ${data.elu}`;
    document.getElementById('resultat-imposteur').textContent = `ЁЯЯе Imposteur : ${data.imposteur}`;
    document.getElementById('resultat-theme').textContent     = `ЁЯОм Th├иme : ${data.theme}`;

    // Votes
    const votesDiv = document.getElementById('resultat-votes');
    votesDiv.innerHTML = '<h3>Votes :</h3>' +
      Object.entries(data.votes).map(([j, n]) => `<p>${j} : ${n} vote${n > 1 ? 's' : ''}</p>`).join('');

    // Points gagn├йs cette manche
    const mancheDiv = document.getElementById('resultat-scores-manche');
    mancheDiv.innerHTML = '<h3>Points cette manche :</h3>' +
      Object.entries(data.scores_manche)
        .sort(([,a],[,b]) => b - a)
        .map(([p, pts]) => `<p>${p === PSEUDO ? 'ЁЯСд ' : ''}${p} : +${pts} pt${pts > 1 ? 's' : ''}</p>`)
        .join('');

    // Scores totaux
    const totalDiv = document.getElementById('resultat-scores-total');
    totalDiv.innerHTML = '<h3>Scores totaux :</h3>' +
      Object.entries(data.scores_total)
        .sort(([,a],[,b]) => b - a)
        .map(([p, pts], i) => {
          const medal = i === 0 ? 'ЁЯеЗ' : i === 1 ? 'ЁЯеИ' : i === 2 ? 'ЁЯеЙ' : '  ';
          return `<p>${medal} ${p === PSEUDO ? '<strong>' : ''}${p} : ${pts} pt${pts > 1 ? 's' : ''}${p === PSEUDO ? '</strong>' : ''}</p>`;
        })
        .join('');

    // Bouton manche suivante / terminer
    const zone = document.getElementById('btn-manche-zone');
    if (EST_HOTE) {
      if (data.manche < data.nb_manches) {
        zone.innerHTML = `<button class="btn btn-primary" onclick="mancheSuivante()">тЦ╢ Manche suivante (${data.manche}/${data.nb_manches})</button>`;
      } else {
        zone.innerHTML = `<button class="btn btn-secondary" onclick="mancheSuivante()">ЁЯПБ Voir le classement final</button>`;
      }
    } else {
      zone.innerHTML = `<p class="hint">En attente de l'h├┤te...</p>`;
    }
    zone.innerHTML += `<a href="/" class="btn btn-danger" style="margin-top:8px">тЭМ Quitter</a>`;
  });

  socket.on('nouvelle_manche', (data) => {
    contenuAffiche = false;
    monRole    = null;
    maVideoUrl = null;
    voteChoisi = null;
    // R├йinitialiser le bouton pr├кt
    const btn = document.getElementById('btn-pret');
    btn.disabled = true;
    btn.textContent = 'тП│ Regarde d\'abord...';
    document.getElementById('txt-attente-pret').style.display = 'none';
    socket.emit('rejoindre_jeu', { code: CODE, pseudo: PSEUDO });
  });

  socket.on('fin_partie', (data) => {
    afficherEcran('ecran-fin');

    const scores = data.scores || {};
    const classement = Object.entries(scores).sort(([,a],[,b]) => b - a);

    let html = '<h3 style="margin-bottom:12px">ЁЯПЖ Classement final</h3>';
    classement.forEach(([pseudo, pts], i) => {
      const medal  = i === 0 ? 'ЁЯеЗ' : i === 1 ? 'ЁЯеИ' : i === 2 ? 'ЁЯеЙ' : `${i+1}.`;
      const isMe   = pseudo === PSEUDO;
      html += `<p style="font-size:${i===0?'1.3em':'1em'};${isMe?'font-weight:bold;color:var(--primary, #6c63ff)':''}">${medal} ${pseudo} тАФ ${pts} pt${pts>1?'s':''}</p>`;
    });

    if (classement.length > 0) {
      const gagnant = classement[0][0];
      html += `<p style="margin-top:16px;font-size:1.1em">ЁЯОЙ Bravo <strong>${gagnant}</strong> !</p>`;
    }

    document.getElementById('podium').innerHTML = html;
  });

  socket.on('nb_prets', (data) => {
    const txt = document.getElementById('txt-attente-pret');
    txt.style.display = 'block';
    txt.textContent = `${data.nb}/${data.total} joueurs pr├кts...`;
  });

  // -------------------------------------------------------
  // AFFICHAGE DU CONTENU
  // -------------------------------------------------------

  function afficherContenu() {
    if (contenuAffiche) return;
    contenuAffiche = true;

    afficherEcran('ecran-indice');

    const zoneVideo   = document.getElementById('zone-video');
    const zoneImage   = document.getElementById('zone-image');
    const zoneMrWhite = document.getElementById('zone-mrwhite');
    const video       = document.getElementById('ma-video');
    const videoSrc    = document.getElementById('src-video');
    const image       = document.getElementById('mon-image');

    // Reset
    zoneVideo.classList.add('hidden');
    zoneImage.classList.add('hidden');
    zoneMrWhite.classList.add('hidden');
    video.pause();
    videoSrc.src = '';
    video.load();
    image.src = '';

    if (monRole === 'mr_white') {
      zoneMrWhite.classList.remove('hidden');
      lancerCompteur(30);
      return;
    }

    if (!maVideoUrl) return;

    const url = maVideoUrl.toLowerCase();
    const estVideo = url.endsWith('.mp4') || url.endsWith('.webm') || url.endsWith('.mov') || url.includes('/video/');

    if (estVideo) {
      zoneVideo.classList.remove('hidden');
      videoSrc.src = maVideoUrl;
      video.load();
      video.play().catch(() => {});
      video.onended = () => debloquerBtnPret();
    } else {
      zoneImage.classList.remove('hidden');
      image.src = maVideoUrl;
      debloquerBtnPret();
    }
  }

  function lancerCompteur(secondes) {
    let s = secondes;
    document.getElementById('compteur').textContent = `${s}s`;
    const timer = setInterval(() => {
      s--;
      document.getElementById('compteur').textContent = `${s}s`;
      if (s <= 0) {
        clearInterval(timer);
        document.getElementById('compteur').textContent = 'тЬЕ';
        debloquerBtnPret();
      }
    }, 1000);
  }

  function debloquerBtnPret() {
    const btn = document.getElementById('btn-pret');
    btn.disabled = false;
    btn.textContent = 'тЬЕ Pr├кt !';
  }

  function declarer_pret() {
    document.getElementById('btn-pret').disabled = true;
    document.getElementById('btn-pret').textContent = 'тП│ En attente des autres...';
    socket.emit('joueur_pret', { code: CODE, pseudo: PSEUDO });
  }

  // -------------------------------------------------------
  // VOTE
  // -------------------------------------------------------

  function afficherEcranVote() {
    voteChoisi = null;
    afficherEcran('ecran-vote');
    fetch(`/api/partie/${CODE}`)
      .then(r => r.json())
      .then(data => {
        console.log("joueurs pour vote:", data.joueurs);
        const div = document.getElementById('liste-votes');
        div.innerHTML = data.joueurs
          .filter(j => j && j !== PSEUDO)
          .map(j => `<button class="btn-vote" onclick="selectionnerVote('${j}', this)">${j}</button>`)
          .join('');
        const btn = document.getElementById('btn-voter');
        btn.disabled = true;
        btn.textContent = 'S├йlectionne un joueur';
      });
  }

  function selectionnerVote(pseudo, el) {
    voteChoisi = pseudo;
    document.querySelectorAll('.btn-vote').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
    const btn = document.getElementById('btn-voter');
    btn.disabled = false;
    btn.textContent = `Voter pour ${pseudo}`;
  }

  function validerVote() {
    if (!voteChoisi) return;
    socket.emit('voter', { code: CODE, cible: voteChoisi });
    document.getElementById('btn-voter').disabled = true;
    document.getElementById('btn-voter').textContent = 'тЬЕ Vote envoy├й !';
  }

  function mancheSuivante() {
    socket.emit('manche_suivante', { code: CODE });
  }

  // -------------------------------------------------------
  // UTILITAIRES
  // -------------------------------------------------------

  function afficherEcran(id) {
    document.querySelectorAll('.ecran').forEach(e => e.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
  }
</script>
</body>
</html>
