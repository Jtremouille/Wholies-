<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Undercover – {{ code }}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="page-center" id="app">

  <!-- ÉCRAN : INDICE (vidéo ou compteur mr white) -->
  <div id="ecran-indice" class="ecran">

    <!-- Vidéo civil / imposteur -->
    <div id="zone-video" class="hidden">
      <video id="ma-video" controls autoplay muted playsinline
             style="width:100%;max-width:500px;border-radius:12px;margin:16px 0">
        <source id="src-video" src="" type="video/mp4">
      </video>
    </div>

    <!-- Image civil / imposteur -->
    <div id="zone-image" class="hidden">
      <img id="mon-image" src="" style="width:100%;max-width:500px;border-radius:12px;margin:16px 0">
    </div>

    <!-- Compteur Mister White -->
    <div id="zone-mrwhite" class="hidden">
      <p class="hint">Tu n'as pas d'indice.<br>Fais semblant de regarder quelque chose... 🎭</p>
      <div id="compteur" class="compteur-mr">--</div>
    </div>

    <button id="btn-pret" class="btn btn-primary" onclick="declarer_pret()" disabled>
      ⏳ Regarde d'abord...
    </button>
    <p id="txt-attente-pret" class="hint" style="display:none"></p>
  </div>

  <!-- ÉCRAN : VOTE -->
  <div id="ecran-vote" class="ecran hidden">
    <div class="logo">🗳</div>
    <h2 class="titre-secondaire">Qui est l'imposteur ?</h2>
    <p class="hint">Discutez, puis votez !</p>
    <div id="liste-votes" class="liste-votes"></div>
    <button id="btn-voter" class="btn btn-primary" onclick="validerVote()" disabled>
      Sélectionne un joueur
    </button>
  </div>

  <!-- ÉCRAN : RÉSULTAT -->
  <div id="ecran-resultat" class="ecran hidden">
    <div id="resultat-icone" class="logo"></div>
    <h2 id="resultat-titre" class="titre-secondaire"></h2>
    <div class="card resultat-card">
      <p id="resultat-elu"></p>
      <p id="resultat-imposteur"></p>
      <p id="resultat-mrwhite"></p>
      <p id="resultat-theme"></p>
    </div>
    <div id="resultat-votes" class="votes-detail"></div>
    <div id="btn-manche-zone"></div>
  </div>

  <!-- ÉCRAN : FIN -->
  <div id="ecran-fin" class="ecran hidden">
    <div class="logo">🏆</div>
    <h2 class="titre-secondaire">Partie terminée !</h2>
    <a href="/" class="btn btn-primary">🏠 Retour à l'accueil</a>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<script>
  const CODE     = "{{ code }}";
  const PSEUDO   = "{{ pseudo }}";
  const EST_HOTE = {{ 'true' if est_hote else 'false' }};

  let monRole    = null;
  let maVideoUrl = null;
  let voteChoisi = null;

  const socket = io(window.location.origin, {transports: ['polling']});

  socket.on('connect', () => {
    console.log("Connecté ! sid=", socket.id);
    socket.emit('rejoindre_jeu', { code: CODE, pseudo: PSEUDO });
  });

  socket.on('ton_role', (data) => {
    console.log("ton_role reçu !", data);
    monRole    = data.role;
    maVideoUrl = data.video_url;
    afficherContenu();
  });

  socket.on('tout_le_monde_pret', () => {
    console.log("tout_le_monde_pret reçu !");
    afficherEcranVote();
  });

  socket.on('resultat', (data) => {
    afficherEcran('ecran-resultat');
    const icone = data.victoire_civils ? '✅' : '❌';
    const titre = data.victoire_civils ? 'Les civils ont gagné !' : "L'imposteur a gagné !";
    document.getElementById('resultat-icone').textContent = icone;
    document.getElementById('resultat-titre').textContent = titre;
    document.getElementById('resultat-elu').textContent = `🗳 Élu : ${data.elu}`;
    document.getElementById('resultat-imposteur').textContent = `🟥 Imposteur : ${data.imposteur}`;
    document.getElementById('resultat-mrwhite').textContent = data.mr_white ? `👤 Mister White : ${data.mr_white}` : '';
    document.getElementById('resultat-theme').textContent = `🎬 Thème : ${data.theme}`;

    const votesDiv = document.getElementById('resultat-votes');
    votesDiv.innerHTML = '<h3>Votes :</h3>' +
      Object.entries(data.votes).map(([j, n]) => `<p>${j} : ${n} vote${n > 1 ? 's' : ''}</p>`).join('');

    const zone = document.getElementById('btn-manche-zone');
    if (EST_HOTE) {
      if (data.manche < data.nb_manches) {
        zone.innerHTML = `<button class="btn btn-primary" onclick="mancheSuivante()">▶ Manche suivante (${data.manche}/${data.nb_manches})</button>`;
      } else {
        zone.innerHTML = `<button class="btn btn-secondary" onclick="mancheSuivante()">🏁 Terminer la partie</button>`;
      }
    } else {
      zone.innerHTML = `<p class="hint">En attente de l'hôte...</p>`;
    }
    zone.innerHTML += `<a href="/" class="btn btn-danger">❌ Quitter</a>`;
  });

  socket.on('nouvelle_manche', (data) => {
    monRole    = null;
    maVideoUrl = null;
    voteChoisi = null;
    socket.emit('rejoindre_jeu', { code: CODE, pseudo: PSEUDO });
  });

  socket.on('fin_partie', () => {
    afficherEcran('ecran-fin');
  });

  socket.on('nb_prets', (data) => {
    const txt = document.getElementById('txt-attente-pret');
    txt.style.display = 'block';
    txt.textContent = `${data.nb}/${data.total} joueurs prêts...`;
  });

  // -------------------------------------------------------
  // AFFICHAGE DE L'INDICE
  // -------------------------------------------------------
function afficherContenu() {

    afficherEcran('ecran-indice');

    // RESET AFFICHAGE
    document.getElementById('zone-video').classList.add('hidden');
    document.getElementById('zone-image').classList.add('hidden');
    document.getElementById('zone-mrwhite').classList.add('hidden');

    if (monRole === 'mr_white') {

        document.getElementById('zone-mrwhite').classList.remove('hidden');
        lancerCompteur(30);

    }
    else if (maVideoUrl && maVideoUrl.includes('/video/')) {

        document.getElementById('zone-video').classList.remove('hidden');

        const video = document.getElementById('ma-video');

        document.getElementById('src-video').src = maVideoUrl;

        video.load();
        video.play();

        video.onended = () => debloquerBtnPret();
    }
    else if (maVideoUrl) {

        document.getElementById('zone-image').classList.remove('hidden');

        document.getElementById('mon-image').src = maVideoUrl;

        debloquerBtnPret();
    }
}

  function lancerCompteur(secondes) {
    let s = secondes;
    document.getElementById('compteur').textContent = `${s}s`;
    const timer = setInterval(() => {
      s--;
      document.getElementById('compteur').textContent = `${s}s`;
      if (s <= 0) {
        clearInterval(timer);
        document.getElementById('compteur').textContent = '✅';
        debloquerBtnPret();
      }
    }, 1000);
  }

  function debloquerBtnPret() {
    const btn = document.getElementById('btn-pret');
    btn.disabled = false;
    btn.textContent = '✅ Prêt !';
  }

  function declarer_pret() {
    document.getElementById('btn-pret').disabled = true;
    document.getElementById('btn-pret').textContent = '⏳ En attente des autres...';
    socket.emit('joueur_pret', { code: CODE, pseudo: PSEUDO });
  }

  // -------------------------------------------------------
  // VOTE
  // -------------------------------------------------------
  function afficherEcranVote() {
    afficherEcran('ecran-vote');
    fetch(`/api/partie/${CODE}`)
      .then(r => r.json())
      .then(data => {
        console.log("joueurs pour vote:", data.joueurs);
        const div = document.getElementById('liste-votes');
        div.innerHTML = data.joueurs
          .filter(j => j !== PSEUDO)
          .map(j => `<button class="btn-vote" onclick="selectionnerVote('${j}', this)">${j}</button>`)
          .join('');
      });
}

  function selectionnerVote(pseudo, el) {
    voteChoisi = pseudo;
    document.querySelectorAll('.btn-vote').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
    const btn = document.getElementById('btn-voter');
    btn.disabled = false;
    btn.textContent = `Voter pour ${pseudo}`;
  }

  function validerVote() {
    if (!voteChoisi) return;
    socket.emit('voter', { code: CODE, cible: voteChoisi });
    document.getElementById('btn-voter').disabled = true;
    document.getElementById('btn-voter').textContent = '✅ Vote envoyé !';
  }

  function mancheSuivante() {
    socket.emit('manche_suivante', { code: CODE });
  }

  // -------------------------------------------------------
  // UTILITAIRES
  // -------------------------------------------------------
  function afficherEcran(id) {
    document.querySelectorAll('.ecran').forEach(e => e.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
  }
</script>
</body>
</html>
